<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Penpot MCP Plugin</title>
    </head>
    <body>
        <div class="plugin-container">
            <div id="connection-status" class="status-pill" data-status="idle">
                <span class="status-dot"></span>
                <span id="status-text" class="body-s">Not connected</span>
            </div>

            <button type="button" id="connect-btn" data-appearance="primary" data-handler="connect-mcp">
                Connect MCP Server
            </button>
            <button
                type="button"
                id="disconnect-btn"
                data-appearance="secondary"
                data-handler="disconnect-mcp"
                hidden
            >
                Disconnect MCP Server
            </button>

            <details class="collapsible-section" id="mcp-tool-usage">
                <summary class="collapsible-header">
                    <svg
                        class="collapsible-arrow"
                        xmlns="http://www.w3.org/2000/svg"
                        viewBox="0 0 24 24"
                        width="12"
                        height="12"
                        fill="currentColor"
                        aria-hidden="true"
                    >
                        <path d="M8.59 16.59L13.17 12 8.59 7.41 10 6l6 6-6 6-1.41-1.41z" />
                    </svg>
                    <span class="body-s">MCP tool usage</span>
                </summary>

                <div class="collapsible-body">
                    <span class="body-s tool-label">Tool status</span>
                    <div class="tool-display">
                        <svg
                            class="tool-icon"
                            xmlns="http://www.w3.org/2000/svg"
                            viewBox="0 0 24 24"
                            width="14"
                            height="14"
                            fill="currentColor"
                            aria-hidden="true"
                        >
                            <path
                                d="M22.7 19l-9.1-9.1c.9-2.3.4-5-1.5-6.9-2-2-5-2.4-7.4-1.3L9 6 6 9 1.6 4.7C.4 7.1.9 10.1 2.9 12.1c1.9 1.9 4.6 2.4 6.9 1.5l9.1 9.1c.4.4 1 .4 1.4 0l2.3-2.3c.5-.4.5-1.1.1-1.4z"
                            />
                        </svg>
                        <span id="current-tool" class="body-s">---</span>
                    </div>

                    <div class="code-section-header">
                        <span class="body-s tool-label">Executed code</span>
                        <button
                            type="button"
                            id="copy-code-btn"
                            class="copy-btn"
                            title="Copy code"
                            disabled
                        >
                            <svg
                                xmlns="http://www.w3.org/2000/svg"
                                viewBox="0 0 24 24"
                                width="14"
                                height="14"
                                fill="currentColor"
                                aria-hidden="true"
                            >
                                <path
                                    d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"
                                />
                            </svg>
                        </button>
                    </div>
                    <textarea
                        id="executed-code"
                        class="code-textarea"
                        readonly
                        placeholder="No code executed yet..."
                    ></textarea>
                </div>
            </details>
        </div>

        <script type="module" src="/src/main.ts"></script>
    </body>
</html>
