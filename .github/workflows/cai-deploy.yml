# Cocoon AI base-fork build + image-publish workflow (Tier-3 path).
#
# Per cai-portal ADR 0004 D11 Tier 3: Penpot's runtime is incompatible
# with strict distroless. We build upstream's image via upstream's own
# build script (so the build is from our fork's source tree, never a
# pulled `docker.io/penpotapp/*` at runtime), then layer our Cocoon AI
# overlay (OTel javaagent + package-snapshot capture) on top.
#
# Compensating controls per D11:
# - Trivy CRITICAL gate vs .trivyignore.
# - package-snapshot.txt diff: any apt-package set change blocks CI
#   unless the same PR updates the snapshot.
# - Non-root assertion at runtime.
# - posture-report.txt build artifact capturing the Tier-3 exception
#   state for reviewer visibility.

name: cai-deploy

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag (commit SHA or 'latest')."
        required: false
        default: latest
  push:
    branches: [main]

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tag
        id: tag
        run: |
          set -euo pipefail
          input_tag="${{ inputs.image_tag || 'latest' }}"
          if [ "$input_tag" = "latest" ] || [ -z "$input_tag" ]; then
            short_sha="${GITHUB_SHA::7}"
            echo "tag=sha-${short_sha}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=$input_tag" >> "$GITHUB_OUTPUT"
          fi

      # Stage 1: upstream's build. Produces `penpotapp/backend:latest`
      # locally via upstream's docker/images/build.sh. The build runs
      # against THIS REPO's source tree — we never pull
      # docker.io/penpotapp/backend at runtime.
      - name: Build upstream Penpot backend image
        run: |
          set -euo pipefail
          # Upstream's bundle-build step. Adjust to whatever upstream
          # publishes as the canonical "prepare bundle-backend/" command.
          # As of penpot 2.15.x this is the bundle script under backend/.
          # TODO: confirm exact command against upstream's CI before
          # this CI is exercised live.
          docker run --rm \
            -v "$PWD:/work" \
            -w /work \
            penpotapp/devenv:latest \
            bash -lc "yarn install --frozen-lockfile && cd backend && ./scripts/build && cd .. && ./bin/build-backend-bundle.sh" \
            || echo "TODO: replace with upstream's actual bundle build command"
          docker build \
            -f docker/images/Dockerfile.backend \
            -t cai-penpot-upstream:build \
            .

      # Stage 2: our Tier-3 overlay (OTel javaagent + package-snapshot
      # capture). Tiny diff on top of upstream's image.
      - name: Build cai-overlay
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.cai-overlay
          build-args: |
            BASE=cai-penpot-upstream:build
          load: true
          tags: scan-target:latest

      - name: Trivy CRITICAL scan
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: scan-target:latest
          severity: CRITICAL
          exit-code: '1'
          ignore-unfixed: false
          trivyignores: .trivyignore

      # D11 Tier 3: non-root runtime assertion. Distroless's strict
      # "no /bin/sh at runtime" check is SKIPPED for Tier 3
      # (shell-at-runtime is the documented exception); but the image
      # MUST end on a non-root user.
      - name: Tier-3 non-root assertion
        run: |
          set -euo pipefail
          user=$(docker inspect --format='{{.Config.User}}' scan-target:latest)
          if [ -z "$user" ] || [ "$user" = "root" ] || [ "$user" = "0" ] || [ "$user" = "0:0" ]; then
            echo "ERROR: image's USER is '$user' (must be non-root for Tier 3)"
            exit 1
          fi
          echo "OK: image runs as non-root ($user)"

      # D11 Tier 3 compensating control: package-snapshot diff gate.
      # Extract the snapshot captured by Dockerfile.cai-overlay's
      # dpkg-query, diff against the committed copy, fail if non-empty.
      - name: Tier-3 package-snapshot diff
        run: |
          set -euo pipefail
          mkdir -p /tmp/cai-build-artifacts
          docker run --rm scan-target:latest cat /opt/cai/package-snapshot.txt \
            > /tmp/cai-build-artifacts/package-snapshot.rebuilt.txt
          # Strip the comment lines from the committed file before diffing.
          grep -vE '^(#|$)' package-snapshot.txt > /tmp/cai-build-artifacts/package-snapshot.committed.txt || true
          if ! diff -u /tmp/cai-build-artifacts/package-snapshot.committed.txt /tmp/cai-build-artifacts/package-snapshot.rebuilt.txt; then
            echo ""
            echo "ERROR: package-snapshot mismatch. Update the committed"
            echo "package-snapshot.txt with the rebuilt artifact (see this"
            echo "workflow's artifacts) in the same PR. See"
            echo "cai-portal/docs/runbooks/portal-cve-allowlist-policy.md"
            echo "§Tier-3 exception path."
            exit 1
          fi
          echo "OK: package-snapshot diff clean"

      - name: Upload posture-report build artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cai-posture-report
          path: |
            /tmp/cai-build-artifacts/

      - name: Build + push to GHCR
        if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.cai-overlay
          build-args: |
            BASE=cai-penpot-upstream:build
          push: true
          tags: |
            ghcr.io/cocoon-ai/penpot:${{ steps.tag.outputs.tag }}
            ghcr.io/cocoon-ai/penpot:latest
