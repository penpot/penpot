packages:
  - 'apps/**'
  - 'libs/**'
allowBuilds:
  '@parcel/watcher': false
  core-js: true
  esbuild: true
  lmdb: false
  msgpackr-extract: false
  puppeteer: false
  sharp: true
  workerd: true

linkWorkspacePackages: true

peerDependencyRules:
  allowedVersions:
    "eslint-plugin-import>eslint": "10.6.0"
    "eslint-plugin-jsx-a11y>eslint": "10.6.0"
    "eslint-plugin-react>eslint": "10.6.0"
